name: CD

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing or new release tag to publish
        required: true
        type: string
      release_name:
        description: Release title (defaults to the tag when empty)
        required: false
        type: string
      checkout_ref:
        description: Branch, tag, or commit to build from
        required: false
        default: main
        type: string
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && github.event.inputs.checkout_ref || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release artifacts
        if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
        run: ./build-axion.sh all

      - name: Build project
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        run: ./gradlew clean build :paper-plugin:jar

      - name: Collect release jars
        if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
        run: |
          mkdir -p release-artifacts
          find build/libs -mindepth 2 -maxdepth 2 -type f -name 'Axion-v*.jar' -exec cp {} release-artifacts/ \;
          find paper-plugin/build/libs -mindepth 2 -maxdepth 2 -type f -name 'AxionPaper-v*.jar' -exec cp {} release-artifacts/ \;

      - name: Upload release jars
        if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: release-artifacts/*
          if-no-files-found: error

  release:
    if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
          name: ${{ github.event_name == 'release' && github.event.release.name || github.event.inputs.release_name || github.event.inputs.release_tag }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.checkout_ref || '' }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-artifacts/*
